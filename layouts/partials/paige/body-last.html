{{/* ── Cookie consent overlay + banner ── */}}
<div id="sh-cookie-overlay" hidden></div>
<div id="sh-cookie-banner" role="dialog" aria-live="polite" aria-label="Cookie consent" hidden>
  <p>We use cookies for analytics (<a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Google Analytics</a>) to help improve this site. No personal data is sold.</p>
  <div class="sh-cookie-actions">
    <button id="sh-cookie-accept" class="sh-cookie-btn sh-cookie-btn--accept">Accept</button>
    <button id="sh-cookie-decline" class="sh-cookie-btn sh-cookie-btn--decline">Decline</button>
  </div>
</div>

<script>
(function () {
    // ── Cookie consent ──
    var banner = document.getElementById('sh-cookie-banner');
    var consent = localStorage.getItem('sh-cookie-consent');

    var overlay = document.getElementById('sh-cookie-overlay');

    function showBanner() {
        if (overlay) overlay.hidden = false;
        banner.hidden = false;
    }

    function hideBanner() {
        if (overlay) overlay.hidden = true;
        banner.hidden = true;
    }

    if (!consent && banner) {
        showBanner();
    }

    document.getElementById('sh-cookie-accept').addEventListener('click', function () {
        localStorage.setItem('sh-cookie-consent', 'accepted');
        hideBanner();
        if (window.shLoadGA) window.shLoadGA();
    });

    document.getElementById('sh-cookie-decline').addEventListener('click', function () {
        localStorage.setItem('sh-cookie-consent', 'declined');
        hideBanner();
    });
}());
</script>

<script>
(function () {
    var header = document.getElementById('paige-site-header');
    if (!header) return;

    var chip = document.getElementById('sh-year-chip');

    // Measure once at load before any collapse occurs
    var collapseAt = header.offsetHeight;
    var expandAt   = 16;
    var isStuck    = false;
    var ticking    = false;

    function setChipTop() {
        if (chip) chip.style.top = (header.offsetHeight + 8) + 'px';
    }

    function update() {
        var y = window.scrollY;
        if (!isStuck && y > collapseAt) {
            isStuck = true;
            header.classList.add('sh-header-stuck');
            setChipTop();
        } else if (isStuck && y < expandAt) {
            isStuck = false;
            header.classList.remove('sh-header-stuck');
            setChipTop();
        }
        ticking = false;
    }

    window.addEventListener('scroll', function () {
        if (!ticking) {
            requestAnimationFrame(update);
            ticking = true;
        }
    }, { passive: true });

    // ── Hamburger toggle (mobile) ──
    var hamburger = document.getElementById('sh-hamburger');
    if (hamburger) {
        hamburger.addEventListener('click', function () {
            var open = header.classList.toggle('sh-nav-open');
            hamburger.setAttribute('aria-expanded', open ? 'true' : 'false');
        });

        // Close nav when a link is tapped
        document.querySelectorAll('#paige-site-menu .nav-link').forEach(function (link) {
            link.addEventListener('click', function () {
                header.classList.remove('sh-nav-open');
                hamburger.setAttribute('aria-expanded', 'false');
            });
        });
    }
}());
</script>
