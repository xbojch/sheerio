{{ $googleAnalyticsId := .Site.Config.Services.GoogleAnalytics.ID }}

<script>
  window.__gaId = '{{ $googleAnalyticsId }}';

  window.shLoadGA = function () {
    if (window.__gaLoaded) return;
    window.__gaLoaded = true;
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://www.googletagmanager.com/gtag/js?id=' + window.__gaId;
    document.head.appendChild(s);
    window.dataLayer = window.dataLayer || [];
    window.gtag = function () { dataLayer.push(arguments); };
    gtag('js', new Date());
    gtag('config', window.__gaId);
  };

  if (localStorage.getItem('sh-cookie-consent') === 'accepted') {
    window.shLoadGA();
  }
</script>
